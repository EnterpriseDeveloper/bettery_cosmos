syntax = "proto3";

package bettery.funds.v1;

import "amino/amino.proto";
import "bettery/funds/v1/params.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

option go_package = "bettery/x/funds/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/bettery/funds/v1/params";
  }

  // GetPercent Queries a list of GetPercent items.
  rpc GetPercent(QueryGetPercentRequest) returns (QueryGetPercentResponse) {
    option (google.api.http).get = "/bettery/funds/v1/get_percent";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// QueryGetPercentRequest defines the QueryGetPercentRequest message.
message QueryGetPercentRequest {}

// QueryGetPercentResponse defines the QueryGetPercentResponse message.
message QueryGetPercentResponse {
  uint64 percent = 1;
}
