services:
  init:
    container_name: bettery-init
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - shared-genesis:/shared
      - node0-data:/node0
      - node1-data:/node1
    environment:
      - CHAIN_ID=bettery1
    entrypoint: ["/bin/sh"]
    command: ["/usr/local/bin/init.sh"]
    restart: "no"

  betterynode0:
    container_name: betterynode0
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "26656:26656"
      - "26657:26657"
      - "1317:1317"
      - "9090:9090"
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - shared-genesis:/shared:Z
      - node0-data:/data:Z
    environment:
      - CHAIN_ID=bettery
      - DAEMON_HOME=/data
      - DAEMON_NAME=betteryd
      - DAEMON_RESTART_AFTER_UPGRADE=true
    entrypoint: ["/bin/sh", "-c"]
    command: [/usr/local/bin/runFirstNode.sh ]

  betterynode1:
    container_name: betterynode1
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - shared-genesis:/shared:Z
      - node1-data:/data:Z
    environment:
      - CHAIN_ID=bettery
      - DAEMON_HOME=/data
      - DAEMON_NAME=betteryd
      - DAEMON_RESTART_AFTER_UPGRADE=true
    entrypoint: ["/bin/sh", "-c"]
    command: ["/usr/local/bin/runNode.sh"]

  postgres:
    image: postgres:16
    container_name: indexer_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: indexer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: /Users/voroshilovmax/Development/betme/indexer_server/
    container_name: indexer_server
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /Users/voroshilovmax/Development/betme/indexer_server/.env
    ports:
      - "2020:2020"  

volumes:
  shared-genesis:
  node0-data:
  node1-data:
  postgres_data: